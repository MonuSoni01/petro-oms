<!DOCTYPE html>
<html lang="en">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<head>
    <meta charset="UTF-8" />
    <title>PETRO OMS - Login</title>
    <link rel="icon" href="/images/app-icon.png" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

    <style>
        * {
            box-sizing: border-box;
            font-family: "Segoe UI", Tahoma, sans-serif;
        }

        body {
            margin: 0;
            height: 100vh;
            background: linear-gradient(135deg, #eef1f6, #dfe6ee);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-box {
            width: 380px;
            background: #ffffff;
            padding: 35px 30px;
            border-radius: 14px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.12);
            text-align: center;
            animation: fadeIn 0.6s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(15px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-box img {
            width: 130px;
            margin-bottom: 15px;
        }

        .login-box h3 {
            margin-bottom: 25px;
            color: #333;
            font-weight: 600;
        }

        .input-group {
            position: relative;
            margin-bottom: 15px;
        }

        .input-group i {
            position: absolute;
            top: 50%;
            left: 12px;
            transform: translateY(-50%);
            color: #999;
        }

        .input-group input {
            width: 100%;
            padding: 12px 12px 12px 40px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .input-group input:focus {
            border-color: #108082;
            outline: none;
            box-shadow: 0 0 0 3px rgba(16, 128, 130, 0.15);
        }

        button {
            width: 100%;
            margin-top: 10px;
            padding: 13px;
            border-radius: 8px;
            background: linear-gradient(135deg, #108082, #0c5f63);
            color: #fff;
            border: none;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 18px rgba(16, 128, 130, 0.35);
        }

        .error {
            color: #d93025;
            margin-top: 12px;
            font-size: 14px;
            display: none;
        }

        .footer-text {
            margin-top: 20px;
            font-size: 12px;
            color: #777;
        }

        .footer-text span {
            color: #108082;
            font-weight: 600;
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.45);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 999;
        }

        .modal-box {
            width: 320px;
            background: #fff;
            border-radius: 14px;
            padding: 25px 20px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.2);
            animation: scaleIn 0.3s ease;
        }

        @keyframes scaleIn {
            from {
                transform: scale(0.8);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .modal-icon {
            font-size: 50px;
            margin-bottom: 10px;
        }

        .modal-box h3 {
            margin: 10px 0;
            color: #333;
        }

        .modal-box p {
            font-size: 14px;
            color: #555;
        }

        .modal-box button {
            margin-top: 15px;
            padding: 10px 25px;
            border-radius: 8px;
            border: none;
            background: #108082;
            color: #fff;
            font-size: 15px;
            cursor: pointer;
        }

        .modal-box button:hover {
            background: #0c5f63;
        }
    </style>
</head>

<body>

    <div class="login-box">
        <img src="images/logo.webp" alt="PETRO LOGO">

        <h3>Admin Login</h3>

        <form onsubmit="adminLogin(); return false;" autocomplete="off"> 
            <div class="input-group">
                <i class="fa-solid fa-envelope"></i>
                <input type="email" id="email" placeholder="Enter Email" required>
            </div>

            <div class="input-group">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="password" placeholder="Enter Password" required>
            </div>
            <div style="
    text-align:left;
    margin-top:-8px;
    margin-bottom:12px;
">

<label style="
    font-size:13px;
    cursor:pointer;
">

<input type="checkbox"
onclick="
document.getElementById(
'password'
).type =
this.checked
? 'text'
: 'password'
">

 Show Password

</label>

</div>

            <button type="submit">
                <i class="fa-solid fa-right-to-bracket"></i> Admin Login
            </button>
        </form>


        <div class="footer-text">
            © 2026 <span>PETRO OMS</span> | MONU SONI
        </div>
    </div>

    <!-- Popup Modal -->
    <div class="modal-overlay" id="popupModal">
        <div class="modal-box">
            <div class="modal-icon" id="modalIcon"></div>
            <h3 id="modalTitle"></h3>
            <p id="modalMessage"></p>
            <button onclick="closePopup()">OK</button>
        </div>
    </div>


    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script> 
    <script src="login.js"></script>
    <script src="js/dev.js"></script>

</body>

</html>
