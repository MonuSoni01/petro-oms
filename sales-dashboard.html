<!DOCTYPE html>
<html lang="en">

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Quotations - PETRO OMS</title>
    <link rel="icon" href="/images/app-icon.png" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <!-- Firebase SDK (Remove async) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="sales-dashboard.css">
    <link rel="stylesheet" href="/css/style.css">

    <link href="vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet" />

</head>

<body>

    <!-- Top Navbar -->
    <div class="top-bar">
        <div class="container-fluid">
            <div class="row justify-content-center align-items-center">
                <div class="col-lg-4 col-md-6 d-flex justify-content-around p-0">
                    <div class="contact-details">
                        <ul class="d-flex">
                            <li>
                                <a href="tel:+91-8000007336"><i class="fa-solid fa-phone"></i> +91-8000007336</a>
                            </li>
                            <li>
                                <a href="mailto:contact@petroindustech.com"><i class="fa-solid fa-envelope"></i>
                                    contact@petroindustech.com</a>
                            </li>
                        </ul>
                    </div>
                </div>

                <div class="col-lg-4 col-md-6 col-sm-6 d-md-flex justify-content-center d-none">
                    <div class="news-box">
                        <ul class="footer-social topnav-social-icon">
                            <li>
                                <a href="https://www.facebook.com/www.petroindustries.in/" target="_blank"><i
                                        class="fa-brands fa-facebook"></i></a>
                            </li>
                            <li>
                                <a href="https://www.instagram.com/petroindustries/" target="_blank"><i
                                        class="fa-brands fa-instagram"></i></a>
                            </li>
                            <li>
                                <a href="https://www.youtube.com/@petroindustechpvtltd" target="_blank"><i
                                        class="fa-brands fa-youtube"></i></a>
                            </li>
                            <li>
                                <a href="https://x.com/Petroindustech" target="_blank"><i
                                        class="fa-brands fa-x-twitter"></i></a>
                            </li>
                            <li>
                                <a href="https://in.pinterest.com/petroindustech/" target="_blank"><i
                                        class="fa-brands fa-pinterest"></i></a>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Navbar Section -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-light top-nav" style="border-bottom:1px solid #000;">
        <div class="container d-flex justify-content-between align-items-center" style="max-width:1280px;">

            <!-- LEFT : LOGO -->
            <a class="navbar-brand" href="https://oms.rankchahiye.com/">
                <img src="images/logo.webp" alt="logo" class="img-fluid" style="height:40px;">
            </a>

            <!-- RIGHT : ADMIN -->
            <div class="d-flex align-items-center">

                <!-- DARK MODE -->
                <label class="toggle-switch mb-0 mr-3">
                    <input type="checkbox" id="darkToggle" onchange="toggleDarkMode()">
                    <span class="slider"></span>
                </label>

                <!-- ADMIN DROPDOWN -->
                <div class="dropdown">
                    <a class="btn btn-light dropdown-toggle d-flex align-items-center" href="#" role="button"
                        id="adminDropdown" data-toggle="dropdown" aria-haspopup="true" aria-expanded="false"
                        style="border-radius:20px;">

                        <i class="fa fa-user-circle text-success mr-2"></i>
                        <span id="adminName">Login</span>
                    </a>

                    <div class="dropdown-menu dropdown-menu-right" aria-labelledby="adminDropdown">
                        <a class="dropdown-item" href="index.html">
                            <i class="fa fa-user mr-2"></i> Home
                        </a>
                        <a class="dropdown-item" style="color: red;" href="sales-login.html">
                            <i class="fa-solid fa-right-from-bracket mr-2"></i> Logout
                        </a>
                    </div>
                </div>

            </div>
        </div>
    </nav>

    <div id="modal">
        <div id="modalBox">
            <span class="closeBtn" onclick="closeModal()">✖</span>
            <div id="modalContent">
                <div id="reasonSection"
                    style="display:none; background-color:#f8d7da; padding:10px; margin-top:20px; border-radius:5px; border:1px solid #f5c6cb;">
                    <h5 id="reasonTitle" style="color:#721c24;">Reason for Hold/Cancel</h5>
                    <p id="reasonText" style="color:#721c24;"></p>
                </div>
            </div>

        </div>
    </div>




    <div class="myq-page mt-4">
        <!-- ======================================
         TOP WELCOME BAR
    ======================================= -->

        <div class="erp-topbar">

            <div class="erp-user-left">

                <div class="erp-user-icon">
                    <i class="fa fa-user"></i>
                </div>

                <div>

                    <div class="erp-welcome-text">
                        Logged in as
                    </div>

                    <h4 class="erp-user-name" id="welcome">

                    </h4>

                </div>

            </div>

            <div class="erp-top-icon">

                <i class="fa fa-face-smile"></i>

            </div>

        </div>

        <!-- ======================================
         DASHBOARD STATS
    ======================================= -->

        <div class="dashboard-stats">

            <!-- TOTAL -->

            <div class="stat-card">

                <div class="stat-icon blue">
                    <i class="fa fa-box"></i>
                </div>

                <div>

                    <span id="totalOrders">0</span>

                    <p>Total Orders</p>

                </div>

            </div>

            <!-- PENDING -->

            <div class="stat-card pending">

                <div class="stat-icon orange">
                    <i class="fa fa-clock"></i>
                </div>

                <div>

                    <span id="pendingOrders">0</span>

                    <p>Pending</p>

                </div>

            </div>

            <!-- DELIVERED -->

            <div class="stat-card delivered">

                <div class="stat-icon green">
                    <i class="fa fa-circle-check"></i>
                </div>

                <div>

                    <span id="deliveredOrders">0</span>

                    <p>Delivered</p>

                </div>

            </div>

        </div>
        

        <div class="myq-table-wrap mt-4">
            <!-- TABLE -->

            <div class="erp-table-scroll">

                <table class="myq-table">

                    <thead>

                        <tr>

                            <th>

                                <i class="fa fa-file-lines"></i>

                                Order No

                            </th>

                            <th>

                                <i class="fa fa-user"></i>

                                Party

                            </th>

                            <th>

                                <i class="fa fa-indian-rupee-sign"></i>

                                Total

                            </th>

                            <th>

                                <i class="fa fa-bolt"></i>

                                Action

                            </th>

                            <th>

                                <i class="fa fa-chart-line"></i>

                                Status

                            </th>

                            <th>

                                <i class="fa fa-file-invoice"></i>

                                Bill

                            </th>

                            <th>

                                <i class="fa fa-wallet"></i>

                                Bill Amount

                            </th>

                        </tr>

                    </thead>
                    <tbody id="myProducts">
                        <!-- Dynamic Products -->
                    </tbody>

                    <tbody id="myOrders">

                        <!-- Dynamic Orders -->

                    </tbody>


                </table>

                <!-- PAGINATION -->
                <div class="myq-pagination-wrap">

                    <div class="pagination-left">
                        <span id="paginationInfo">Showing 0 to 0 of 0 orders</span>
                    </div>

                    <div class="pagination-right">

                        <select id="rowsPerPage" class="pagination-select">
                            <option value="10" selected>10 / Page</option>
                            <option value="25">25 / Page</option>
                            <option value="50">50 / Page</option>
                            <option value="100">100 / Page</option>
                        </select>

                        <button class="pagination-btn" id="prevPageBtn">
                            <i class="fa fa-chevron-left"></i>
                            Prev
                        </button>

                        <div id="pageNumbers" class="page-numbers"></div>

                        <button class="pagination-btn" id="nextPageBtn">
                            Next
                            <i class="fa fa-chevron-right"></i>
                        </button>

                    </div>

                </div>

            </div>

        </div>



    </div>

    <!-- Import Firebase configuration and JavaScript file -->
    <script src="../firebaseconfig.js"></script>
    <script src="sales-dashboard.js"></script>

    <script>

        function toggleDarkMode() {
            const body = document.body;
            const toggle = document.getElementById("darkToggle");

            if (toggle.checked) {
                body.classList.add("dark");
                localStorage.setItem("petro_dark", true);
            } else {
                body.classList.remove("dark");
                localStorage.setItem("petro_dark", false);
            }
        }

    </script>

    <script src="vendor/jquery/jquery.min.js"></script>
    <script src="vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
    <script src="js/jquery.appear.js"></script>
    <script src="js/script.js"></script>
    <!-- <script src="js/dev.js"></script> -->

</body>

</html>
